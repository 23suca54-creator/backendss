spring.application.name=jobapplication

spring.datasource.url=jdbc:h2:mem:jobtrackerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Bind server port to Azure's PORT environment variable when present
# Azure App Service provides the port via the PORT environment variable.
# Fall back to 8080 locally.
server.port=${PORT:8080}

# Ensure the app listens on all network interfaces so the platform can route requests
server.address=0.0.0.0
